[main]
font=JetBrainsMono Nerd Font:size=14
dpi-aware=yes
prompt=  
icons-enabled=no
terminal=ghostty -e
layer=overlay
exit-on-keyboard-focus-loss=yes
 
lines=10
width=40
horizontal-pad=20
vertical-pad=20
inner-pad=8
 
[colors]
background=1a1b26ff
text=c0caf5ff
match=7aa2f7ff
selection=24283bff
selection-text=7aa2f7ff
selection-match=7dcfffff
border=c0caf5ff
 
[border]
width=3
radius=5
 
[dmenu]
# print selected index instead of text (useful for scripting; off by default)
print-index=no
 
